<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-dark">
    <h2 class="text-center text-white mt-5">CALCOLA IL PREZZO DEL TUO BIGLIETTO</h2>
    
    <form>
        <div class="container p-3 text-center">
            <div class="row">

                <div class="col">
                    <label for="" class="text-white">Nome Cognome</label> <br>
                    <input type="text" id="name" placeholder="Nome Cognome" value="Filippo Zuppini">
                </div>

                <div class="col">
                    <label class="text-white">Chilometri da percorrere:</label> <br>
                    <input type="number" id="chilometri" placeholder="inserisci km" value="12">        
                </div>
                
                <div class="col">
                    <label class="text-white">Fascia d'etá:</label> <br>
                    <input type="number" id="eta" placeholder="inserisci etá" value="30">
                </div>
                
            </div>
            <div class="row mt-3 text-center">
                
                <div class="col">
                    <button type="submit" class="align-items-start px-3 py-1" id="calcola">Calcola</button>
                    <button type="" class="px-3 py-1" id="calcola">Ripristina</button>
                </div>

            </div>
            
        </div>  
    </form>
    
    
    <h2 class="text-center text-white mt-5 mb-4">IL TUO BIGLIETTO</h2>
    <div class="container bg-white p-4">
        <h2 class="fs-4 mb-4">DETTAGLIO PASSEGGERI</h2>        
        <div class="row">
            <div class="col">
                <h5 class="">NOME PASSEGGIERO</h5>
                <p id="resultName">[Nome]</p>
            </div>
            <div class="col">
                <h5 class="">Offerta</h5>
                <p>Biglietto Standard</p>
            </div>
            <div class="col">
                <h5 class="">Carrozza</h5>
                <div class="d-flex">
                    <p>N. </p><p id="resultCarrozza">000</p>

                </div>
            </div>
            <div class="col">
                <h5 class="">Codice CP</h5>
                <p id="resultCP">------</p>
            </div>
            <div class="col">
                <h5 class="" >Costo biglietto</h5>
                <div class="d-flex">
                    <p>€</p><p id="resultPrice">0.00</p>
                </div>
            </div>
        </div>
    </div>
    



    <script src="./assets/js/main.js"></script>
    
</body>
</html>
